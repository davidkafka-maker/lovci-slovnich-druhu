<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lovci slovních druhů</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --good: #15803d;
    --bad: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: var(--bg);
    margin: 0;
    padding: 20px;
    color: var(--text);
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 8px 22px rgba(0,0,0,.08);
    margin-bottom: 14px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 32px;
  }
  .sub {
    color: var(--muted);
    margin-bottom: 16px;
  }
  .field {
    width: min(320px, 92%);
    padding: 12px 14px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    font-size: 16px;
    margin: 6px auto;
    display: block;
  }
  .menu-btn, .small-btn {
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
  }
  .menu-btn {
    padding: 14px 18px;
    font-size: 19px;
    width: min(340px, 92%);
    margin: 8px auto;
    display: block;
  }
  .small-btn {
    padding: 10px 14px;
    font-size: 15px;
    background: #1f2937;
    color: #fff;
  }
  .mode-wrap {
    margin: 14px 0;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .mode-label {
    font-weight: 700;
  }
  .topbar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .timer {
    font-size: 24px;
    font-weight: 800;
  }
  #progress {
    font-size: 20px;
    font-weight: 800;
    min-height: 52px;
    white-space: pre-line;
    margin-bottom: 8px;
  }
  #sentence {
    font-size: 28px;
    line-height: 1.45;
    max-width: 720px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px auto 16px;
    padding: 0 6px;
  }
  .highlight {
    font-weight: 800;
    text-decoration: underline;
    color: #111827;
    display: inline-block;
    margin: 0 0.22em;
    padding: 0 0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(120px, 150px));
    gap: 12px;
    justify-content: center;
    margin-top: 14px;
  }
  .btn {
    padding: 16px 10px;
    font-size: 24px;
    border: none;
    border-radius: 14px;
    color: white;
    cursor: pointer;
    font-weight: 800;
    transition: transform .08s ease, opacity .12s ease;
  }
  .btn:active {
    transform: scale(.98);
  }
  .btn:disabled {
    opacity: .78;
    cursor: not-allowed;
  }
  #result {
    font-size: 30px;
    margin-top: 18px;
    font-weight: 800;
    white-space: pre-line;
    min-height: 78px;
  }
  .good { color: var(--good); }
  .bad { color: var(--bad); }
  .hidden { display: none !important; }
  .note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }
  .stats-box {
    text-align: left;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.8;
    font-size: 18px;
  }

  #confetti-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 9999;
  }
  .confetti {
    position: fixed;
    top: -20px;
    width: 12px;
    height: 18px;
    opacity: 0.95;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    from {
      transform: translate3d(0, -10px, 0) rotate(0deg);
      opacity: 1;
    }
    to {
      transform: translate3d(var(--drift), 110vh, 0) rotate(var(--spin));
      opacity: 0;
    }
  }

</style>
</head>
<body>
<div id="confetti-layer" aria-hidden="true"></div>
<div class="wrap">

  <div id="login" class="card">
    <h1>Lovci slovních druhů</h1>
    <div class="sub">Vyplň údaje a zvol režim hry.</div>

    <div id="rememberBox" class="hidden">
      <div class="card" style="box-shadow:none;border:1px solid #e5e7eb;">
        <div style="font-weight:700;margin-bottom:10px;">Pokračovat jako:</div>
        <div id="rememberText" style="font-size:20px;font-weight:800;"></div>
        <button class="menu-btn" style="background:#2563eb;color:#fff;" onclick="useRemembered()">POKRAČOVAT</button>
        <button class="menu-btn" style="background:#e5e7eb;color:#111827;" onclick="showEditProfile()">ZMĚNIT ÚDAJE</button>
      </div>
    </div>

    <div id="formBox">
      <input id="name" class="field" placeholder="Jméno">
      <input id="surname" class="field" placeholder="Příjmení">
      <input id="class" class="field" placeholder="Třída">
      <div class="note">Třídu piš velkými písmeny a čísly bez teček, např. 3A.</div>

      <div class="mode-wrap">
        <label class="mode-label"><input type="radio" name="mode" value="train" checked onchange="menuSwitchSound()"> TRÉNINK</label>
        <label class="mode-label"><input type="radio" name="mode" value="hard" onchange="menuSwitchSound()"> NAOSTRO</label>
      </div>

      <button class="menu-btn" style="background:#111827;color:#fff;" onclick="start()">ZAČÍT HRÁT</button>
    </div>
  </div>

  <div id="game" class="card hidden">
    <div class="topbar">
      <div class="timer">Čas: <span id="time">20</span></div>
      <button class="small-btn" onclick="menu()">MENU</button>
    </div>

    <div id="progress"></div>
    <div id="sentence"></div>

    <div class="grid" id="grid"></div>
    <div id="result"></div>
  </div>

  <div id="statsScreen" class="card hidden">
    <h1>Statistika</h1>
    <div class="stats-box" id="statsText"></div>
    <button class="menu-btn" style="background:#111827;color:#fff;" onclick="backToLogin()">ZPĚT</button>
  </div>

</div>

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(vol, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.start(now);
  osc.stop(now + duration);
}

function soundCorrect() { tone(700, 950, 0.16, 0.08); }
function soundWrong() { tone(260, 140, 0.24, 0.09); }
function soundWin() {
  tone(523, 659, 0.24, 0.95);
  setTimeout(() => tone(659, 784, 0.24, 1.00), 110);
  setTimeout(() => tone(784, 1046, 0.30, 1.00), 220);
  setTimeout(() => tone(1046, 1318, 0.34, 1.00), 360);
}
function launchConfetti() {
  const layer = document.getElementById("confetti-layer");
  if (!layer) return;
  layer.innerHTML = "";
  const colors = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7", "#ec4899"];
  const total = 220;
  for (let i = 0; i < total; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = `${Math.random() * 100}vw`;
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = `${2.8 + Math.random() * 2.2}s`;
    el.style.animationDelay = `${Math.random() * 0.35}s`;
    el.style.setProperty("--drift", `${-220 + Math.random() * 440}px`);
    el.style.setProperty("--spin", `${360 + Math.random() * 1080}deg`);
    el.style.width = `${8 + Math.random() * 8}px`;
    el.style.height = `${10 + Math.random() * 12}px`;
    layer.appendChild(el);
  }
  setTimeout(() => { layer.innerHTML = ""; }, 6000);
}
function menuSwitchSound() { tone(520, 620, 0.08, 0.04); }

function loadRemembered() {
  const remembered = localStorage.getItem("lovci_profile");
  if (!remembered) return;
  const profile = JSON.parse(remembered);
  document.getElementById("rememberText").innerText = `${profile.name} ${profile.surname} (${profile.className})`;
  document.getElementById("rememberBox").classList.remove("hidden");
  document.getElementById("formBox").classList.add("hidden");
}

function useRemembered() {
  document.getElementById("login").dataset.useRemembered = "1";
  start();
}

function showEditProfile() {
  document.getElementById("rememberBox").classList.add("hidden");
  document.getElementById("formBox").classList.remove("hidden");
  document.getElementById("login").dataset.useRemembered = "0";
}

function createButtons() {
  const g = document.getElementById("grid");
  if (buttonsCreated) return;
  const rows = 5;
  const cols = 2;
  for (let pos = 1; pos <= 10; pos++) {
    const row = Math.floor((pos - 1) / cols);
    const col = (pos - 1) % cols;
    const label = col * rows + row + 1;
    const b = document.createElement("button");
    b.className = "btn";
    b.style.background = colors[label - 1];
    b.innerText = label;
    b.onclick = () => answer(label);
    g.appendChild(b);
  }
  buttonsCreated = true;
}

function disableButtons(flag) {
  document.querySelectorAll("#grid .btn").forEach(btn => btn.disabled = flag);
}

function start() {
  mode = document.querySelector('input[name="mode"]:checked').value;

  let profile = null;
  if (document.getElementById("login").dataset.useRemembered === "1") {
    const remembered = localStorage.getItem("lovci_profile");
    if (remembered) profile = JSON.parse(remembered);
  } else {
    const name = document.getElementById("name").value.trim();
    const surname = document.getElementById("surname").value.trim();
    const className = document.getElementById("class").value.trim().toUpperCase();
    if (!name || !surname || !className) {
      alert("Vyplň jméno, příjmení i třídu.");
      return;
    }
    profile = { name, surname, className };
    localStorage.setItem("lovci_profile", JSON.stringify(profile));
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("statsScreen").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  createButtons();
  correctSeries = 0;
  trainCorrect = 0;
  trainWrong = 0;
  recentWords = [];
  seriesWords = [];
  nextQuestion();
}

function menu() {
  clearInterval(timer);
  document.getElementById("game").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("result").innerText = "";
  document.getElementById("rememberBox").classList.add("hidden");
  document.getElementById("formBox").classList.remove("hidden");
  document.getElementById("login").dataset.useRemembered = "0";
}

function backToLogin() {
  document.getElementById("statsScreen").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("rememberBox").classList.add("hidden");
  document.getElementById("formBox").classList.remove("hidden");
  document.getElementById("login").dataset.useRemembered = "0";
}

function updateProgress() {
  if (mode === "hard") {
    document.getElementById("progress").innerText = "ZVLÁDNUTÁ SLOVA: " + correctSeries + " / 10";
  } else {
    document.getElementById("progress").innerText =
      "ZVLÁDNUTÁ SLOVA: " + trainCorrect + "\nNEZVLÁDNUTÁ SLOVA: " + trainWrong;
  }
}

function chooseQuestion() {
  let candidates = db.filter(q => !recentWords.includes(q.highlightedWord));
  if (mode === "hard") {
    candidates = candidates.filter(q => !seriesWords.includes(q.highlightedWord));
  }

  if (candidates.length === 0) {
    candidates = db.filter(q => mode !== "hard" || !seriesWords.includes(q.highlightedWord));
  }
  if (candidates.length === 0) {
    candidates = db.slice();
  }

  return candidates[Math.floor(Math.random() * candidates.length)];
}

function registerWord(word) {
  recentWords.push(word);
  if (recentWords.length > RECENT_LIMIT) recentWords.shift();
  if (mode === "hard" && !seriesWords.includes(word)) {
    seriesWords.push(word);
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function highlightSentence(sentence, word) {
  const safeSentence = String(sentence || "");
  const safeWord = String(word || "");
  const idx = safeSentence.indexOf(safeWord);
  if (idx === -1 || !safeWord) return escapeHtml(safeSentence);

  const before = safeSentence.slice(0, idx);
  const match = safeSentence.slice(idx, idx + safeWord.length);
  const after = safeSentence.slice(idx + safeWord.length);

  return escapeHtml(before) + '<span class="highlight">' + escapeHtml(match) + '</span>' + escapeHtml(after);
}

function nextQuestion() {
  clearInterval(timer);
  disableButtons(false);
  time = 20;
  document.getElementById("time").innerText = (mode === "hard") ? time : "∞";
  updateProgress();

  current = chooseQuestion();
  registerWord(current.highlightedWord);

  document.getElementById("sentence").innerHTML = highlightSentence(current.sentence, current.highlightedWord);
  document.getElementById("result").innerText = "";

  if (mode === "hard") {
    timer = setInterval(() => {
      time--;
      document.getElementById("time").innerText = time;
      if (time <= 0) fail();
    }, 1000);
  }
}

function answer(n) {
  if (!current) return;
  clearInterval(timer);
  disableButtons(true);

  if (n === current.answerNumber) {
    soundCorrect();
    document.getElementById("result").innerText = "SPRÁVNĚ";

    if (mode === "train") {
      trainCorrect++;
      updateProgress();
      setTimeout(nextQuestion, 1200);
    } else {
      correctSeries++;
      updateProgress();

      if (correctSeries >= 10) {
        soundWin();
        launchConfetti();
        document.getElementById("result").innerText = "MÁŠ JEDNIČKU";
        return;
      }
      setTimeout(nextQuestion, 1000);
    }
  } else {
    soundWrong();

    if (mode === "train") {
      trainWrong++;
      document.getElementById("result").innerText = "CHYBA\nSPRÁVNĚ: " + current.answerLabel;
      updateProgress();
      setTimeout(nextQuestion, 2000);
    } else {
      document.getElementById("result").innerText = "SMŮLA";
      correctSeries = 0;
      seriesWords = [];
      updateProgress();
      setTimeout(nextQuestion, 1500);
    }
  }
}

function fail() {
  clearInterval(timer);
  disableButtons(true);
  soundWrong();
  document.getElementById("result").innerText = "VYPRŠEL ČAS";
  correctSeries = 0;
  seriesWords = [];
  updateProgress();
  setTimeout(nextQuestion, 1500);
}

loadRemembered();
</script>
