<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lovci slovních druhů</title>
<style>
:root {
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --good:#15803d;
  --bad:#b91c1c;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#eef2ff 0%, #f8fafc 100%);
  color:var(--text);
  padding:14px;
}
.wrap { max-width:520px; margin:0 auto; }
.card {
  background:var(--card);
  border-radius:20px;
  padding:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
  margin-bottom:14px;
}
h1 { margin:6px 0 10px; text-align:center; font-size:30px; }
.muted { color:var(--muted); }
.big-btn,.small-btn,.answer {
  border:none; border-radius:14px; font-weight:700; cursor:pointer;
}
.big-btn { width:100%; padding:16px; font-size:20px; margin-top:10px; }
.small-btn { padding:10px 14px; background:#111827; color:#fff; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.mode-training { background:#2563eb; color:#fff; }
.mode-sharp { background:#dc2626; color:#fff; }
.hidden { display:none !important; }
#sentence {
  font-size:25px; line-height:1.5; min-height:120px;
  display:flex; align-items:center; justify-content:center; text-align:center;
  word-break:normal; overflow-wrap:break-word;
}
.highlight {
  font-weight:700; color:#0f3d91; background:#dbeafe;
  padding:2px 8px; border-radius:10px; display:inline;
}
#timer { text-align:center; font-size:42px; font-weight:800; margin:8px 0 2px; }
#timerLabel { text-align:center; color:var(--muted); font-size:14px; }
.bar { height:12px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin-top:12px; }
.bar > div { height:100%; width:100%; background:#2563eb; transition:width 0.1s linear; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.answer { color:#fff; padding:15px 10px; min-height:66px; font-size:16px; }
.answer:disabled { opacity:.75; cursor:not-allowed; }
.pn { background:#3f51b5; }
.adj { background:#43a047; }
.pron { background:#00acc1; }
.num { background:#8e24aa; }
.verb { background:#e53935; }
.adv { background:#fb8c00; }
.prep { background:#fdd835; color:#111827; }
.conj { background:#616161; }
.part { background:#d81b60; }
.interj { background:#795548; }
#streak { font-size:24px; font-weight:800; text-align:center; }
#remaining {
  text-align:center; font-size:16px; font-weight:700; color:#dc2626; margin-top:6px;
}
#modeBadge {
  text-align:center; font-weight:700; margin-bottom:8px; color:#fff;
  border-radius:999px; padding:8px 12px;
}
#result {
  min-height:64px; text-align:center; font-size:34px; font-weight:900; margin-top:10px;
}
.good { color:var(--good); }
.bad { color:var(--bad); }
.toprow {
  display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px;
}
.center { text-align:center; }
.win-screen { text-align:center; padding:20px 10px; }
.win-title {
  font-size:48px; font-weight:900; color:#15803d; line-height:1.1; margin:10px 0 20px;
}
.win-sub { font-size:20px; color:#166534; margin-bottom:20px; }
.answer-line {
  margin-top:10px;
  font-size:28px;
  font-weight:900;
  color:#0f3d91;
}
</style>
</head>
<body>
<div class="wrap">

  <div id="startScreen" class="card">
    <h1>Lovci slovních druhů</h1>
    <p class="muted center">Vyber režim hry. Na odpověď máš vždy 20 sekund.</p>
    <button class="big-btn mode-training" onclick="startGame('training')">TRÉNINK</button>
    <button class="big-btn mode-sharp" onclick="startGame('sharp')">NAOSTRO</button>
    <div class="row" style="justify-content:center;margin-top:12px">
      <button class="small-btn" onclick="toggleSound()" id="soundBtnStart">Zvuk: zapnutý</button>
    </div>
    <p class="muted center" style="margin-top:12px">V databázi je teď 159 slov.</p>
  </div>

  <div id="gameScreen" class="hidden">
    <div class="card">
      <div id="modeBadge">TRÉNINK</div>
      <div id="sentence"></div>
      <div id="timer">20</div>
      <div id="timerLabel">sekund do konce</div>
      <div class="bar"><div id="timeBar"></div></div>
    </div>

    <div class="card">
      <div class="grid">
        <button class="answer pn" onclick="answer('podstatné jméno')">Podstatné jméno</button>

        <button class="answer adv" onclick="answer('příslovce')">Příslovce</button>
        <button class="answer prep" onclick="answer('předložka')">Předložka</button>
        <button class="answer conj" onclick="answer('spojka')">Spojka</button>
        <button class="answer part" onclick="answer('částice')">Částice</button>
        <button class="answer interj" onclick="answer('citoslovce')">Citoslovce</button>
      </div>
    </div>

    <div class="card">
      <div class="toprow">
        <div>
          <div id="streak">ZVLÁDNUTÁ SLOVA: 0</div>
          <div id="remaining"></div>
        </div>
        <div class="row">
          <button class="small-btn" onclick="toggleSound()" id="soundBtnGame">Zvuk: zapnutý</button>
          <button class="small-btn" onclick="backToMenu()">Menu</button>
        </div>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <div id="winScreen" class="card hidden">
    <div class="win-screen">
      <div class="win-title">MÁŠ JEDNIČKU</div>
      <div class="win-sub">Zvládl jsi správně určit deset slov za sebou.</div>
      <button class="big-btn mode-training" onclick="backToMenu()">ZPĚT DO MENU</button>
    </div>
  </div>

</div>

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderSentence(question) {
  const sentence = String(question.sentence);
  const word = String(question.word);

  if (sentence.includes("___")) {
    const parts = sentence.split("___");
    return escapeHtml(parts[0]) + "<span class='highlight'>" + escapeHtml(word) + "</span>" + escapeHtml(parts.slice(1).join("___"));
  }

  const lowerSentence = sentence.toLocaleLowerCase("cs");
  const lowerWord = word.toLocaleLowerCase("cs");
  const idx = lowerSentence.indexOf(lowerWord);

  if (idx !== -1) {
    const before = sentence.slice(0, idx);
    const match = sentence.slice(idx, idx + word.length);
    const after = sentence.slice(idx + word.length);
    return escapeHtml(before) + "<span class='highlight'>" + escapeHtml(match) + "</span>" + escapeHtml(after);
  }

  return escapeHtml(sentence);
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function refillPool() {
  questionPool = shuffle([...originalQuestions]);
}

let current = null;
let streak = 0;
let mode = "training";
let soundOn = true;
let acceptingAnswers = false;

let startTimeMs = 0;
let timerInterval = null;
const totalSeconds = 20;
let audioCtx = null;
let lastTickSecond = null;

function ensureAudio() {
  try {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}

function playTone(from, to, duration, volume=0.08) {
  if (!soundOn) return;
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(from, now);
  osc.frequency.exponentialRampToValueAtTime(to, now + duration);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.start(now);
  osc.stop(now + duration);
}

function beep(type) {
  if (!soundOn) return;
  if (type === "success") {
    playTone(700, 950, 0.16, 0.08);
    return;
  }
  if (type === "fail") {
    playTone(260, 140, 0.24, 0.09);
    return;
  }
  if (type === "tick") {
    playTone(480, 480, 0.05, 0.05);
    return;
  }
  if (type === "win") {
    ensureAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = [523, 659, 784, 1046];
    notes.forEach((freq, idx) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const start = now + idx * 0.14;
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.13, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.20);
      osc.start(start);
      osc.stop(start + 0.20);
    });
  }
}

function updateSoundButtons() {
  const text = "Zvuk: " + (soundOn ? "zapnutý" : "vypnutý");
  document.getElementById("soundBtnStart").textContent = text;
  document.getElementById("soundBtnGame").textContent = text;
}

function toggleSound() {
  soundOn = !soundOn;
  ensureAudio();
  updateSoundButtons();
}

function updateHeader() {
  const streakEl = document.getElementById("streak");
  const remainingEl = document.getElementById("remaining");
  if (mode === "sharp") {
    streakEl.style.display = "block";
    streakEl.textContent = "ZVLÁDNUTÁ SLOVA: " + streak;
    remainingEl.textContent = "Do vítězství zbývá: " + (10 - streak);
  } else {
    streakEl.style.display = "none";
    remainingEl.textContent = "";
  }
}

function setButtonsDisabled(disabled) {
  document.querySelectorAll(".answer").forEach(b => b.disabled = disabled);
}

function showModeBadge() {
  const badge = document.getElementById("modeBadge");
  if (mode === "training") {
    badge.textContent = "TRÉNINK";
    badge.style.background = "#2563eb";
  } else {
    badge.textContent = "NAOSTRO";
    badge.style.background = "#dc2626";
  }
}

function clearTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function getNextQuestion() {
  if (questionPool.length === 0) refillPool();
  return questionPool.pop();
}

function updateTimer() {
  const elapsedMs = Date.now() - startTimeMs;
  const remainingMs = Math.max(0, totalSeconds * 1000 - elapsedMs);
  const remainingSeconds = Math.ceil(remainingMs / 1000);

  document.getElementById("timer").textContent = remainingSeconds;
  document.getElementById("timeBar").style.width = ((remainingMs / (totalSeconds * 1000)) * 100) + "%";

  if (remainingSeconds <= 3 && remainingSeconds > 0 && remainingSeconds !== lastTickSecond) {
    lastTickSecond = remainingSeconds;
    beep("tick");
  }

  if (remainingMs <= 0) {
    clearTimer();
    timeExpired();
  }
}

function startQuestion() {
  clearTimer();
  current = getNextQuestion();
  acceptingAnswers = true;
  setButtonsDisabled(false);
  document.getElementById("result").innerHTML = "";
  document.getElementById("sentence").innerHTML = renderSentence(current);
  updateHeader();
  startTimeMs = Date.now();
  lastTickSecond = null;
  updateTimer();
  timerInterval = setInterval(updateTimer, 100);
}

function startGame(selectedMode) {
  ensureAudio();
  mode = selectedMode;
  streak = 0;
  showModeBadge();
  updateHeader();
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("winScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  refillPool();
  startQuestion();
}

function answer(choice) {
  ensureAudio();
  if (!acceptingAnswers) return;
  acceptingAnswers = false;
  clearTimer();
  setButtonsDisabled(true);

  if (choice === current.answer) {
    streak++;
    updateHeader();
    document.getElementById("result").innerHTML = "<span class='good'>SPRÁVNĚ</span>";
    beep("success");

    if (mode === "sharp" && streak >= 10) {
      showWinScreen();
      return;
    }

    setTimeout(startQuestion, 1000);
  } else {
    wrongAnswer(false);
  }
}

function wrongAnswer(timeout) {
  clearTimer();
  acceptingAnswers = false;
  setButtonsDisabled(true);
  beep("fail");

  if (mode === "training") {
    document.getElementById("result").innerHTML =
      "<span class='bad'>CHYBA</span><div class='answer-line'>" + current.answer.toUpperCase() + "!</div>";
    setTimeout(startQuestion, 1200);
  } else {
    streak = 0;
    updateHeader();
    document.getElementById("result").innerHTML = timeout
      ? "<span class='bad'>SMŮLA<br><span style='font-size:22px'>Čas vypršel</span></span>"
      : "<span class='bad'>SMŮLA</span>";
    setTimeout(startQuestion, 1000);
  }
}

function timeExpired() {
  wrongAnswer(true);
}

function showWinScreen() {
  clearTimer();
  acceptingAnswers = false;
  setButtonsDisabled(true);
  beep("win");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("winScreen").classList.remove("hidden");
}

function backToMenu() {
  clearTimer();
  acceptingAnswers = false;
  setButtonsDisabled(true);
  streak = 0;
  document.getElementById("result").innerHTML = "";
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("winScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
  updateHeader();
}

updateSoundButtons();
updateHeader();
